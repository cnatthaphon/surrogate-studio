<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LSTM-VAE Demo — Ant Trajectory Reconstruction</title>
</head>
<body>
  <div id="app"></div>

  <!--
    Demo page: loads ALL core scripts from main index.html (../../).
    Then adds demo-specific data + schema + module + preset.
    No duplicate code. Core library is the single source of truth.
    Demo only provides: data, schema registration, module registration, preset memory.
  -->

  <script>
    // Load all scripts from main index.html — ensures demo uses exact same core
    (function () {
      var BASE = "../../";
      var xhr = new XMLHttpRequest();
      xhr.open("GET", BASE + "index.html", false);
      xhr.send();
      if (xhr.status !== 200) {
        document.getElementById("app").textContent = "Cannot load core from " + BASE + "index.html";
        return;
      }
      // extract and inject CSS links
      var cssRe = /<link\s+rel="stylesheet"\s+href="([^"]+)"/g;
      var cssMatch;
      while ((cssMatch = cssRe.exec(xhr.responseText)) !== null) {
        document.write('<link rel="stylesheet" href="' + cssMatch[1] + '">');
      }
      // extract and inject scripts
      var re = /<script\s+src="([^"]+)"/g;
      var match;
      while ((match = re.exec(xhr.responseText)) !== null) {
        var src = match[1];
        if (src.startsWith("./")) src = BASE + src.substring(2);
        else if (!src.startsWith("http") && !src.startsWith("//")) src = BASE + src;
        document.write('<script src="' + src + '"><\/script>');
      }
    })();
  </script>

  <!-- Demo-specific: data + schema + module + preset (NOT library code) -->
  <script src="./ant_data.js"></script>
  <script src="./ant_trajectory_schema.js"></script>
  <script src="./ant_trajectory_module.js"></script>
  <script src="./preset.js"></script>

  <!-- Initialize with pre-loaded demo store -->
  <script>
    var store = OSCWorkspaceStore.createMemoryStore();
    var preset = window.LSTM_VAE_DEMO_PRESET;
    if (preset) {
      if (preset.dataset) store.upsertDataset(preset.dataset);
      if (preset.models) preset.models.forEach(function (m) { store.upsertModel(m); });
      if (preset.trainers) preset.trainers.forEach(function (t) { store.upsertTrainerCard(t); });
    }
    SurrogateStudio.init({
      mountEl: document.getElementById('app'),
      defaultSchemaId: 'ant_trajectory',
      defaultTab: 'dataset',
      store: store,
    });
  </script>
</body>
</html>
