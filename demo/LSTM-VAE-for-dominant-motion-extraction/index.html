<body>
  <div id="app"></div>
  <script>
    // Create store and pre-load demo data
    var store = OSCWorkspaceStore.createMemoryStore();
    var preset = window.LSTM_VAE_DEMO_PRESET;

    if (preset) {
      // dataset
      if (preset.dataset) store.upsertDataset(preset.dataset);

      // models (multiple)
      if (preset.models) preset.models.forEach(function (m) { store.upsertModel(m); });
      if (preset.model) store.upsertModel(preset.model);

      // trainers (multiple)
      if (preset.trainers) preset.trainers.forEach(function (t) { store.upsertTrainerCard(t); });
      if (preset.trainer) store.upsertTrainerCard(preset.trainer);
    }

    SurrogateStudio.init({
      mountEl: document.getElementById('app'),
      defaultSchemaId: 'ant_trajectory',
      defaultTab: 'dataset',
      store: store,
    });
  </script>
