<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LSTM-VAE Ant Trajectory Reconstruction — Surrogate Studio Demo</title>
  <meta name="description" content="Browser-based reproduction of LSTM-VAE for dominant motion extraction (Jadhav & Barati Farimani, 2022). Train, visualize, and generate ant trajectories.">

  <!-- CDN libs -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jerosoler/Drawflow/dist/drawflow.min.css">
  <script src="https://cdn.jsdelivr.net/gh/jerosoler/Drawflow/dist/drawflow.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>

  <!-- Surrogate Studio bundle -->
  <script src="../../dist/surrogate-studio.js"></script>
  <script src="./ant_data.js"></script>
  <script src="./ant_trajectory_schema.js"></script>
  <script src="./ant_trajectory_module.js"></script>
  <script src="./preset.js"></script>
</head>
<body>
  <div id="app"></div>
  <script>
    var store=OSCWorkspaceStore.createMemoryStore();
    var preset=window.LSTM_VAE_DEMO_PRESET;
    if(preset){
      if(preset.dataset)store.upsertDataset(preset.dataset);
      if(preset.models)preset.models.forEach(function(m){store.upsertModel(m)});
      if(preset.trainers)preset.trainers.forEach(function(t){store.upsertTrainerCard(t)});
      // generation + evaluation items use custom tables
      store.initTables({tables:["generationRuns","evaluations"]});
      if(preset.generations)preset.generations.forEach(function(g){store.save({table:"generationRuns",values:[g]})});
      if(preset.evaluations)preset.evaluations.forEach(function(e){store.save({table:"evaluations",values:[e]})});
    }
    SurrogateStudio.init({mountEl:document.getElementById("app"),defaultSchemaId:"ant_trajectory",defaultTab:"dataset",store:store});
  </script>
</body>
</html>
