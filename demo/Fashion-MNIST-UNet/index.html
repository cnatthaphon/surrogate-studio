</head>
<body>
  <div id="app"></div>
  <script>
    var store = OSCWorkspaceStore.createMemoryStore();
    var preset = window.FASHION_MNIST_UNET_PRESET;
    if (preset) {
      if (preset.dataset) store.upsertDataset(preset.dataset);
      if (preset.models) preset.models.forEach(function (m) { store.upsertModel(m); });
      if (preset.trainers) preset.trainers.forEach(function (t) { store.upsertTrainerCard(t); });
      store.initTables({ tables: ["generationRuns", "evaluations"] });
      if (preset.generations) preset.generations.forEach(function (g) { store.save({ table: "generationRuns", values: [g] }); });
      if (preset.evaluations) preset.evaluations.forEach(function (e) { store.save({ table: "evaluations", values: [e] }); });
    }
    SurrogateStudio.init({ mountEl: document.getElementById("app"), defaultSchemaId: "fashion_mnist", defaultTab: "model", store: store });
  </script>
</body>
