<body>
  <div id="app"></div>
  <script>
    var store = OSCWorkspaceStore.createMemoryStore();
    var preset = window.FASHION_MNIST_GAN_PRESET;
    if (preset) {
      if (preset.dataset) store.upsertDataset(preset.dataset);
      if (preset.models) preset.models.forEach(function (m) { store.upsertModel(m); });
      if (preset.trainers) preset.trainers.forEach(function (t) {
        // Load pre-trained weights from global base64 variable (works with file://)
        if (t._weightsVar && t.status === "done" && window[t._weightsVar]) {
          (function (trainer) {
            try {
              var b64 = window[trainer._weightsVar];
              var bin = atob(b64);
              var bytes = new Uint8Array(bin.length);
              for (var bi = 0; bi < bin.length; bi++) bytes[bi] = bin.charCodeAt(bi);
              var floats = new Float32Array(bytes.buffer);
              var specs = [];
              var off = 0;
              var model = preset.models.find(function (m) { return m.id === trainer.modelId; });
              if (model && model.graph && window.OSCModelBuilderCore) {
                var tf = window.tf;
                var built = window.OSCModelBuilderCore.buildModelFromGraph(tf, model.graph, {
                  mode: "direct", featureSize: 784, windowSize: 1, seqFeatureSize: 784,
                  allowedOutputKeys: [{ key: "pixel_values", headType: "reconstruction" }],
                  defaultTarget: "pixel_values", numClasses: 10,
                });
                specs = built.model.getWeights().map(function (w, i) {
                  var shape = w.shape; var sz = shape.reduce(function (a, b) { return a * b; }, 1);
                  var s = { name: "w" + i, shape: shape, dtype: "float32", offset: off }; off += sz * 4; return s;
                });
                built.model.dispose();
              }
              trainer.modelArtifacts = { weightSpecs: specs, weightValues: Array.from(floats) };
              trainer.modelArtifactsLast = trainer.modelArtifacts;
              // Load epoch history if available (same var name + _EPOCHS suffix)
              var epochsVar = trainer._weightsVar.replace(/_B64$/, "_EPOCHS");
              if (window[epochsVar]) {
                store.replaceTrainerEpochs(trainer.id, window[epochsVar]);
                console.log("[preset] Loaded", window[epochsVar].length, "epochs for", trainer.name);
              }
              store.upsertTrainerCard(trainer);
              console.log("[preset] Loaded pre-trained weights for", trainer.name, "(" + floats.length + " floats)");
            } catch (e) { console.warn("[preset] Weight decode failed for", trainer.name, e.message); }
          })(t);
        }
        store.upsertTrainerCard(t);
      });
      store.initTables({ tables: ["generationRuns", "evaluations"] });
      if (preset.generations) preset.generations.forEach(function (g) { store.save({ table: "generationRuns", values: [g] }); });
      if (preset.evaluations) preset.evaluations.forEach(function (e) { store.save({ table: "evaluations", values: [e] }); });
    }
    SurrogateStudio.init({ mountEl: document.getElementById("app"), defaultSchemaId: "fashion_mnist", defaultTab: "model", store: store });
  </script>
</body>
